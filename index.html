<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Mia Routine v4.3</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="La Mia Routine">
<meta name="theme-color" content="#f5f0eb">
<link rel="apple-touch-icon" id="appIcon">
<link rel="manifest" id="manifestLink">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:       #141210;
  --bg2:      #1c1916;
  --bg3:      #242018;
  --line:     #2e2a24;
  --muted:    #5a5248;
  --sub:      #7a7068;
  --text:     #f0ead8;
  --textsoft: #c8bfaa;
  --gold:     #c8a84a;
  --gold2:    #e8c86a;
  --golddim:  #3a3020;
  --mc:#a07830;--ec:#6a5a8e;--tc:#5a7a6a;--yc:#7a5a80;--wc:#4a6a8a;--bc:#5a7a5a;--bb:#4a7a6a;
  --cream:#f0ead8;--warm:#2e2a24;--sand:#5a5248;--terracotta:#c8a84a;--deep:#f0ead8;
}
/* ── TEMA CHIARO ── */
body.light{
  --bg:       #f5f0eb;
  --bg2:      #ffffff;
  --bg3:      #e8ddd2;
  --line:     #e0d4c4;
  --muted:    #c9b8a4;
  --sub:      #a09080;
  --text:     #3d2b1f;
  --textsoft: #5a4030;
  --gold:     #b07a5c;
  --gold2:    #c89070;
  --golddim:  #f5ece6;
  --mc:#e8b850;--ec:#8c7a9e;--tc:#7a9e8c;--yc:#9e7a8c;--wc:#7a8e9e;
  --cream:#f5f0eb;--warm:#e8ddd2;--sand:#c9b8a4;--terracotta:#b07a5c;--deep:#3d2b1f;
}

*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'DM Mono',monospace;
  min-height:100vh;
  padding:1.5rem 1rem 5rem;
}

/* ─ HEADER ─ */
header{
  text-align:center;
  margin-bottom:2rem;
  padding-bottom:1.5rem;
  border-bottom:1px solid var(--line);
}
h1{font-family:'Cormorant Garamond',serif;font-size:2.4rem;font-weight:300;color:var(--text);}
h1 em{font-style:italic;color:var(--gold);}
.sub{font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-top:.35rem;}

/* ─ DAY SELECTOR ─ */
.days{display:flex;gap:.4rem;justify-content:center;flex-wrap:wrap;margin-bottom:1.8rem;}
.db{
  background:none;border:1px solid var(--line);color:var(--muted);
  font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;
  padding:.4rem .75rem;cursor:pointer;border-radius:2px;transition:all .2s;
}
.db.on{background:var(--gold);border-color:var(--gold);color:#0a0a0a;font-weight:600;}
.db:hover:not(.on){border-color:var(--gold);color:var(--gold);}

/* ─ ACCORDION CARD ─ */
.card{
  background:var(--bg2);
  border:1px solid var(--line);
  border-radius:6px;
  margin-bottom:.7rem;
  overflow:hidden;
}
.card-hd{
  display:flex;align-items:center;gap:.65rem;
  padding:.85rem 1.1rem;
  background:var(--bg3);
  cursor:pointer;user-select:none;
  transition:background .15s;
}
.card-hd:hover{background:#2a2620;}
.card-hd .icon{font-size:.95rem;}
.card-hd .title{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:400;color:var(--text);}
.badge{
  margin-left:auto;font-size:.48rem;letter-spacing:.1em;text-transform:uppercase;
  padding:.18rem .5rem;border-radius:2px;color:rgba(255,255,255,.8);
  background:var(--muted);white-space:nowrap;
}
.bm{background:var(--mc);}
.be{background:var(--ec);}
.bt{background:var(--tc);}
.by{background:var(--yc);}
.bw{background:var(--wc);}
.chevron{font-size:.65rem;color:var(--muted);margin-left:.3rem;transition:transform .25s;flex-shrink:0;}
.card.shut .chevron{transform:rotate(-90deg);}
.card-body{overflow:hidden;transition:max-height .32s ease,opacity .25s ease;max-height:3000px;opacity:1;}
.card.shut .card-body{max-height:0;opacity:0;}

/* ─ STEPS ─ */
.steps{padding:.3rem 0;}
.step{
  display:flex;align-items:flex-start;gap:.7rem;
  padding:.6rem 1.1rem;
  border-bottom:1px solid var(--line);
  transition:background .12s;
}
.step:last-child{border-bottom:none;}
.step:hover{background:rgba(255,255,255,.02);}
.snum{font-size:.5rem;color:var(--muted);min-width:.9rem;text-align:right;flex-shrink:0;padding-top:3px;}
.chk{
  width:17px;height:17px;
  border:1.5px solid var(--muted);
  border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .2s;margin-top:1px;
}
.step.done .chk{background:var(--gold);border-color:var(--gold);}
.step.done .chk::after{
  content:'';width:5px;height:3px;
  border-left:1.5px solid #0a0a0a;
  border-bottom:1.5px solid #0a0a0a;
  transform:rotate(-45deg) translateY(-1px);
}
.si{flex:1;cursor:pointer;min-width:0;}
.snr{display:flex;align-items:center;gap:.35rem;flex-wrap:wrap;}
.sn{
  font-size:.72rem;line-height:1.4;color:var(--text);
  border-bottom:1px dashed transparent;
  transition:border-color .15s,color .15s;
}
.si:hover .sn{color:var(--gold);border-bottom-color:var(--gold);}
.step.done .sn{text-decoration:line-through;color:var(--muted);}
.ssub{font-size:.54rem;color:var(--sub);font-style:italic;margin-top:.12rem;}
.timing{
  display:inline-block;font-size:.46rem;letter-spacing:.06em;text-transform:uppercase;
  background:var(--golddim);color:var(--gold);
  border:1px solid #4a3a10;
  padding:.08rem .35rem;border-radius:2px;flex-shrink:0;
}
.stag{font-size:.46rem;letter-spacing:.08em;text-transform:uppercase;padding:.1rem .35rem;border-radius:2px;flex-shrink:0;}
.tag-retinoid{background:#2a1f30;color:#b088c0;}
.tag-glycolic{background:#1a2820;color:#70a888;}
.tag-peptide {background:#2a2018;color:var(--gold);}
.tag-spf     {background:#2a2810;color:#b8a840;}
.tag-capelli {background:#1e1e2e;color:#8888c0;}
.tag-rose    {background:#2a1820;color:#c07888;}

/* ─ PROGRESS ─ */
.prog{padding:0 1.1rem .75rem;}
.pbg{height:2px;background:var(--line);border-radius:2px;overflow:hidden;}
.pfi{height:100%;background:var(--gold);border-radius:2px;transition:width .4s;}
.plb{font-size:.5rem;color:var(--muted);letter-spacing:.1em;margin-top:.3rem;}

/* ─ TIP ─ */
.tip-hd{background:#1a1e20;}
.tip-bd{padding:1rem 1.1rem;}
.tip-tx{font-size:.72rem;line-height:1.8;color:var(--textsoft);}

/* ─ YOGA ─ */
.yoga-hd{background:#1e1a20;}
.yoga-bd{padding:1rem 1.1rem;}
.yna{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:400;color:var(--text);margin-bottom:.2rem;}
.yzo{font-size:.5rem;letter-spacing:.12em;text-transform:uppercase;color:var(--yc);margin-bottom:.85rem;}
.yill{width:100%;background:#1a1612;border-radius:6px;margin-bottom:.9rem;padding:.6rem;display:flex;align-items:center;justify-content:center;}
.yill svg{width:100%;max-width:260px;height:auto;display:block;margin:0 auto;}
.ysteps{list-style:none;margin-bottom:.7rem;}
.ysteps li{font-size:.68rem;line-height:1.65;padding:.22rem 0;border-bottom:1px solid var(--line);display:flex;gap:.5rem;color:var(--textsoft);}
.ysteps li:last-child{border-bottom:none;}
.ysteps li::before{content:attr(data-n);color:var(--yc);font-size:.58rem;flex-shrink:0;padding-top:.1rem;}
.yreps{display:inline-block;font-size:.56rem;background:var(--golddim);color:var(--yc);padding:.18rem .55rem;border-radius:2px;}
body.light .yreps{background:#f4eef3;}
.yvideo{
  display:inline-flex;align-items:center;gap:.35rem;margin-top:.65rem;
  font-size:.58rem;color:var(--gold);
  background:var(--golddim);border:1px solid #4a3a10;
  padding:.28rem .65rem;border-radius:3px;
  transition:background .15s;cursor:pointer;
  font-family:'DM Mono',monospace;letter-spacing:.06em;
}
.yvideo:hover{background:#4a3a18;}

/* ─ WORKOUT ─ */
.wo-hd{background:#1a1e22;}
.wo-bd{padding:1rem 1.1rem;}
.wo-type{font-size:.5rem;letter-spacing:.14em;text-transform:uppercase;color:var(--wc);margin-bottom:.3rem;}
.wo-name{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:400;color:var(--text);margin-bottom:.15rem;}
.wo-meta{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:.9rem;}
.wo-pill{font-size:.48rem;letter-spacing:.08em;text-transform:uppercase;background:#1a2230;color:var(--wc);padding:.12rem .45rem;border-radius:2px;}
.wo-circuit{background:#1a2230;border-radius:3px;padding:.4rem .7rem;margin-bottom:.7rem;font-size:.56rem;color:var(--wc);letter-spacing:.06em;}
.wo-exercises{list-style:none;margin-bottom:.7rem;}
.wo-ex{display:flex;align-items:flex-start;gap:.7rem;padding:.55rem 0;border-bottom:1px solid var(--line);}
.wo-ex:last-child{border-bottom:none;}
.wo-ex-num{font-size:.5rem;color:var(--muted);min-width:1rem;text-align:right;flex-shrink:0;padding-top:.15rem;}
.wo-ex-body{flex:1;cursor:pointer;}
.wo-ex-name{font-size:.72rem;line-height:1.3;color:var(--text);}
.wo-ex-detail{font-size:.56rem;color:var(--sub);margin-top:.1rem;font-style:italic;}
.wo-ex-chk{width:17px;height:17px;border:1.5px solid var(--muted);border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;margin-top:1px;}
.wo-ex.done .wo-ex-chk{background:var(--wc);border-color:var(--wc);}
.wo-ex.done .wo-ex-chk::after{content:'';width:5px;height:3px;border-left:1.5px solid white;border-bottom:1.5px solid white;transform:rotate(-45deg) translateY(-1px);}
.wo-ex.done .wo-ex-name{text-decoration:line-through;color:var(--muted);}
.wo-rest-day{text-align:center;padding:1.5rem 1rem;}
.wo-rest-icon{font-size:2rem;margin-bottom:.5rem;}
.wo-rest-tx{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-style:italic;color:var(--muted);}
.wo-rest-sub{font-size:.6rem;color:var(--sub);margin-top:.3rem;}
.wo-add-btn{
  display:block;width:100%;margin-top:.8rem;padding:.65rem;
  background:none;border:1px dashed var(--wc);color:var(--wc);
  font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;
  cursor:pointer;border-radius:2px;transition:all .2s;
}
.wo-add-btn:hover{background:var(--wc);color:white;}

/* ─ RULES ─ */
.rules{
  background:var(--bg2);border:1px solid var(--line);
  border-radius:6px;padding:.9rem 1.1rem;margin-bottom:.7rem;
}
.rt{font-size:.5rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:.65rem;}
.rule{font-size:.66rem;line-height:1.55;padding:.26rem 0;border-bottom:1px solid var(--line);display:flex;gap:.5rem;color:var(--textsoft);}
.rule:last-child{border-bottom:none;}
.rule::before{content:'—';color:var(--muted);flex-shrink:0;}

/* ─ RESET BUTTON ─ */
.reset{
  display:block;width:100%;padding:.7rem;
  background:none;border:1px solid var(--line);color:var(--muted);
  font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;
  cursor:pointer;border-radius:4px;transition:all .2s;margin-top:.5rem;
}
.reset:hover{border-color:var(--gold);color:var(--gold);}

/* ─ NOTE GLOBALI ─ */
.gnotes-hd{background:#181814;}
.gnotes-bd{padding:1rem 1.1rem;}
.gnotes-ta{
  width:100%;min-height:140px;padding:.7rem .8rem;
  background:#0e0e0c;border:1px solid var(--line);border-radius:4px;
  font-family:'DM Mono',monospace;font-size:.7rem;line-height:1.75;
  color:var(--text);resize:vertical;outline:none;transition:border-color .2s;
}
.gnotes-ta:focus{border-color:var(--gold);}
.gnotes-ta::placeholder{color:var(--muted);}
.gnotes-saved{font-size:.5rem;color:var(--gold);letter-spacing:.08em;margin-top:.3rem;opacity:0;transition:opacity .5s;}
.gnotes-saved.show{opacity:1;}

/* ─ CONGRATS ─ */
.congrats{
  text-align:center;font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:1.1rem;color:var(--gold);padding:.6rem 0;
  opacity:0;transition:opacity .5s;pointer-events:none;
}
.congrats.show{opacity:1;}

/* ─ SHEET (bottom sheet) ─ */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:flex-end;justify-content:center;}
.ov.open{display:flex;}
.sheet{
  background:var(--bg2);width:100%;max-width:520px;
  border-radius:14px 14px 0 0;border-top:1px solid var(--line);
  padding:1.4rem 1.4rem 3rem;max-height:85vh;overflow-y:auto;
  animation:up .22s ease;
}
@keyframes up{from{transform:translateY(28px);opacity:0}to{transform:translateY(0);opacity:1}}
.sh{width:34px;height:3px;background:var(--muted);border-radius:2px;margin:0 auto 1.2rem;}
.shn{font-family:'Cormorant Garamond',serif;font-size:1.45rem;font-weight:400;margin-bottom:.3rem;color:var(--text);}
.shta{margin-bottom:1rem;display:flex;gap:.4rem;flex-wrap:wrap;}
.shbl{margin-bottom:.9rem;padding-bottom:.9rem;border-bottom:1px solid var(--line);}
.shbl:last-child{border-bottom:none;margin-bottom:0;}
.shla{font-size:.5rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:.35rem;}
.shqt{font-family:'Cormorant Garamond',serif;font-size:1.05rem;color:var(--gold);}
.shtx{font-size:.7rem;line-height:1.75;color:var(--textsoft);}
.shcl{
  display:block;width:100%;margin-top:1.3rem;padding:.75rem;
  background:var(--gold);color:#0a0a0a;border:none;
  font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;
  cursor:pointer;border-radius:4px;font-weight:600;
  transition:background .2s;
}
.shcl:hover{background:var(--gold2);}

/* ─ NOTE IN SHEET ─ */
.notes-wrap{margin-top:.5rem;}
.notes-ta{
  width:100%;min-height:80px;padding:.6rem .75rem;
  background:#0e0e0c;border:1px solid var(--line);border-radius:4px;
  font-family:'DM Mono',monospace;font-size:.68rem;line-height:1.65;
  color:var(--text);resize:vertical;outline:none;transition:border-color .2s;
}
.notes-ta:focus{border-color:var(--gold);}
.notes-ta::placeholder{color:var(--muted);}
.notes-saved{font-size:.5rem;color:var(--gold);letter-spacing:.08em;margin-top:.3rem;opacity:0;transition:opacity .4s;}
.notes-saved.show{opacity:1;}
.note-label{
  display:inline-flex;align-items:center;gap:.25rem;
  font-size:.46rem;letter-spacing:.07em;text-transform:uppercase;
  background:#1a2030;color:#6898c0;
  border:1px solid #2a3848;
  padding:.1rem .35rem;border-radius:2px;flex-shrink:0;
}
.title-input{
  width:100%;padding:.45rem .6rem;margin-top:.4rem;
  background:#0e0e0c;border:1px solid var(--line);border-radius:4px;
  font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:var(--text);
  outline:none;transition:border-color .2s;
}
.title-input:focus{border-color:var(--gold);}
.title-reset{font-size:.52rem;color:var(--muted);cursor:pointer;margin-top:.25rem;display:inline-block;text-decoration:underline;}
.title-reset:hover{color:var(--gold);}

/* ─ VIDEO POPUP ─ */
.vov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:300;align-items:center;justify-content:center;padding:1.2rem;}
.vov.open{display:flex;}
.vpop{background:#0e0c0a;border:1px solid var(--line);border-radius:10px;width:100%;max-width:480px;overflow:hidden;animation:up .22s ease;}
.vpop-hd{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1rem;border-bottom:1px solid var(--line);}
.vpop-title{font-family:'Cormorant Garamond',serif;font-size:1rem;color:var(--text);font-style:italic;flex:1;margin-right:.5rem;}
.vpop-close{background:none;border:none;color:var(--muted);font-size:1.1rem;cursor:pointer;padding:.1rem .3rem;line-height:1;}
.vpop-close:hover{color:var(--text);}
.vpop-thumb{position:relative;padding-bottom:56.25%;overflow:hidden;background:#111;}
.vpop-thumb img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;opacity:.8;}
.vpop-thumb .play-icon{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:56px;height:56px;background:rgba(200,168,74,.9);border-radius:50%;display:flex;align-items:center;justify-content:center;pointer-events:none;}
.vpop-thumb .play-icon::after{content:'';border-left:22px solid #0a0a0a;border-top:13px solid transparent;border-bottom:13px solid transparent;margin-left:4px;}
.vpop-actions{padding:.9rem 1rem;}
.vpop-btn{
  display:block;text-align:center;padding:.7rem;
  background:var(--gold);color:#0a0a0a;text-decoration:none;
  font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;
  border-radius:4px;transition:background .15s;font-weight:600;
}
.vpop-btn:hover{background:var(--gold2);}

/* ─ WORKOUT SHEET EXTRAS ─ */
.wo-add-delete{
  background:none;border:1px dashed #3a2020;color:#885050;
  font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;
  padding:.5rem .8rem;border-radius:2px;cursor:pointer;width:100%;transition:all .2s;
}
.wo-add-delete:hover{background:#3a2020;color:#c08080;}

/* ── TIP INTERATTIVO ── */
.tip-icon{font-size:1.4rem;margin-bottom:.5rem;}
.tip-titolo{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:400;color:var(--text);margin-bottom:.5rem;}
.tip-testo{font-size:.7rem;line-height:1.8;color:var(--textsoft);margin-bottom:.9rem;}
.tip-citazione{
  border-left:2px solid var(--gold);padding:.5rem .8rem;
  margin:.7rem 0;font-family:'Cormorant Garamond',serif;
  font-style:italic;font-size:.9rem;color:var(--textsoft);
}
.tip-autore{font-size:.52rem;color:var(--muted);letter-spacing:.08em;margin-top:.2rem;font-style:normal;}
.tip-domanda{
  background:var(--golddim);border:1px solid #4a3a10;
  border-radius:4px;padding:.7rem .85rem;
  font-size:.68rem;line-height:1.65;color:var(--gold);
  margin:.7rem 0;font-style:italic;
}
body.light .tip-domanda{background:#f5ece6;border-color:#e0c8b0;color:#b07a5c;}
.tip-textarea{
  width:100%;min-height:80px;padding:.6rem .75rem;margin-top:.5rem;
  background:var(--bg);border:1px solid var(--line);border-radius:4px;
  font-family:'DM Mono',monospace;font-size:.68rem;line-height:1.65;
  color:var(--text);resize:vertical;outline:none;transition:border-color .2s;
}
body.light .tip-textarea{background:#faf7f4;}
.tip-textarea:focus{border-color:var(--gold);}
.tip-textarea::placeholder{color:var(--muted);}
/* Timer */
.tip-intro{font-size:.62rem;color:var(--muted);margin-bottom:.7rem;font-style:italic;}
.tip-timer{text-align:center;padding:.5rem 0;}
.tip-fase-label{
  font-family:'Cormorant Garamond',serif;font-size:1.1rem;
  color:var(--text);margin-bottom:.3rem;min-height:1.6rem;
}
.tip-countdown{
  font-size:3rem;font-family:'DM Mono',monospace;
  color:var(--gold);line-height:1;margin:.3rem 0;
  transition:color .4s;
}
.tip-progress-ring{margin:.5rem auto;display:block;}
.tip-rip{font-size:.55rem;color:var(--muted);letter-spacing:.1em;margin-bottom:.7rem;}
.tip-avvia{
  display:inline-block;padding:.6rem 1.4rem;
  background:var(--gold);color:#0a0a0a;border:none;
  font-family:'DM Mono',monospace;font-size:.6rem;
  letter-spacing:.12em;text-transform:uppercase;
  cursor:pointer;border-radius:4px;font-weight:600;
  transition:background .2s;
}
.tip-avvia:hover{background:var(--gold2);}
body.light .tip-avvia{color:white;}
.tip-avvia:disabled{opacity:.4;cursor:default;}

/* ── TIMER GLOBALE FLOTTANTE ── */
.ftimer-btn{
  position:fixed;bottom:1.4rem;right:1.2rem;z-index:400;
  width:52px;height:52px;border-radius:50%;
  background:var(--gold);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(0,0,0,.4);
  font-size:1.3rem;transition:transform .2s,background .2s;
}
.ftimer-btn:hover{transform:scale(1.08);background:var(--gold2);}

let chk = {}, notes = {}, openSecs = {}, customNames = {}, globalNote = '';
try{chk=JSON.parse(localStorage.getItem('sk_chk')||'{}');}catch(e){}
try{notes=JSON.parse(localStorage.getItem('sk_notes')||'{}');}catch(e){}
try{openSecs=JSON.parse(localStorage.getItem('sk_secs')||'{}');}catch(e){}
try{customNames=JSON.parse(localStorage.getItem('sk_names')||'{}');}catch(e){}
try{globalNote=localStorage.getItem('sk_gnote')||'';}catch(e){}

function saveChk(){try{localStorage.setItem('sk_chk',JSON.stringify(chk));}catch(e){}}
function saveNotes(){try{localStorage.setItem('sk_notes',JSON.stringify(notes));}catch(e){}}
function saveSecs(){try{localStorage.setItem('sk_secs',JSON.stringify(openSecs));}catch(e){}}
function saveNames(){try{localStorage.setItem('sk_names',JSON.stringify(customNames));}catch(e){}}
function saveGlobalNote(){try{localStorage.setItem('sk_gnote',globalNote);}catch(e){}}

let day = new Date().getDay(); day = day===0?6:day-1;
// default: solo la sera è aperta, tutto il resto chiuso
function isSectionOpen(id){
  if(openSecs[id] !== undefined) return openSecs[id] !== false;
  // default: solo la sera è aperta per le sezioni giornaliere, note sempre aperte
  return id === `${day}-e` || id === 'gnote';
}

// ─────────────────────────────────────────────────────────────────────────────
// WORKOUT — fully custom, per-day
// ─────────────────────────────────────────────────────────────────────────────
// Storage: woData = { "0": { title:"Lunedì", items:[{id,name,serie,reps,note,done}] }, ... }
let woData = {};
try{ woData = JSON.parse(localStorage.getItem('sk_wo') || '{}'); }catch(e){}
function saveWo(){ try{ localStorage.setItem('sk_wo', JSON.stringify(woData)); }catch(e){} }

// ensure day entry exists
function woDayEnsure(){
  if(!woData[day]) woData[day] = { title:'', items:[] };
}

function woNewId(){
  return Date.now().toString(36) + Math.random().toString(36).slice(2,5);
}

function woAddItem(){
  woDayEnsure();
  woData[day].items.push({ id: woNewId(), name:'Nuovo esercizio', serie:'', reps:'', note:'', done:false });
  saveWo(); renderAll();
}

function woDeleteItem(id){
  woDayEnsure();
  woData[day].items = woData[day].items.filter(x => x.id !== id);
  saveWo(); renderAll();
}

function woToggle(id){
  woDayEnsure();
  const it = woData[day].items.find(x => x.id === id);
  if(it){ it.done = !it.done; saveWo(); renderAll(); }
}

function woSaveTitle(){
  const el = document.getElementById('woTitleInput');
  if(!el) return;
  woDayEnsure();
  woData[day].title = el.value;
  saveWo();
}

// open the workout item sheet
let currentWoId = null;
function woOpenSheet(id){
  woDayEnsure();
  const it = woData[day].items.find(x => x.id === id);
  if(!it) return;
  currentWoId = id;
  document.getElementById('shBody').innerHTML = `
    <div class="shbl">
      <div class="shla">Nome esercizio</div>
      <input class="title-input" id="woName" type="text" value="${esc(it.name)}" oninput="woSaveField()" placeholder="es. Squat"/>
    </div>
    <div class="shbl" style="display:flex;gap:.7rem;">
      <div style="flex:1">
        <div class="shla">Serie</div>
        <input class="title-input" id="woSerie" type="text" value="${esc(it.serie)}" oninput="woSaveField()" placeholder="es. 3"/>
      </div>
      <div style="flex:1">
        <div class="shla">Reps / Durata</div>
        <input class="title-input" id="woReps" type="text" value="${esc(it.reps)}" oninput="woSaveField()" placeholder="es. 12 / 40s"/>
      </div>
    </div>
    <div class="shbl">
      <div class="shla">Note</div>
      <textarea class="notes-ta" id="woNote" oninput="woSaveField()" placeholder="Indicazioni, varianti, carichi…">${esc(it.note)}</textarea>
    </div>
    <div class="shbl" style="border-bottom:none;padding-bottom:0">
      <button onclick="woDeleteItem('${id}');closeSheet();" class="wo-add-delete">✕ Elimina voce</button>
    </div>
  `;
  document.getElementById('ov').classList.add('open');
}

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

function woSaveField(){
  if(!currentWoId) return;
  woDayEnsure();
  const it = woData[day].items.find(x => x.id === currentWoId);
  if(!it) return;
  const n = document.getElementById('woName');
  const s = document.getElementById('woSerie');
  const r = document.getElementById('woReps');
  const no = document.getElementById('woNote');
  if(n) it.name  = n.value;
  if(s) it.serie = s.value;
  if(r) it.reps  = r.value;
  if(no) it.note  = no.value;
  saveWo();
  renderAll();
}

function renderWorkout(){
  woDayEnsure();
  const d = woData[day];
  const items = d.items || [];
  const done = items.filter(x=>x.done).length;
  const total = items.length;
  const pct = total ? Math.round(done/total*100) : 0;

  const itemsHtml = items.map((it,i) => {
    const sub = [it.serie ? it.serie+' serie' : '', it.reps || ''].filter(Boolean).join(' · ');
    const hasNote = it.note && it.note.trim();
    const detailHtml = sub ? '<div class="wo-ex-detail">' + esc(sub) + '</div>' : '';
    const nameHtml = esc(it.name) + (hasNote ? '<span class="note-label" style="margin-left:.4rem">✎ nota</span>' : '');
    return `<li class="wo-ex ${it.done?'done':''}">
      <span class="wo-ex-num">${i+1}</span>
      <div class="wo-ex-body" onclick="woOpenSheet('${it.id}')">
        <div class="wo-ex-name">${nameHtml}</div>
        ${detailHtml}
      </div>
      <div class="wo-ex-chk" onclick="woToggle('${it.id}')"></div>
    </li>`;
  }).join('');

  const emptyHtml = `<div style="text-align:center;padding:1.4rem 0 .8rem;color:var(--sand);font-size:.68rem;font-style:italic">Nessun esercizio · aggiungine uno ↓</div>`;

  const progHtml = total ? `<div class="prog" style="margin-top:.4rem"><div class="pbg"><div class="pfi" style="width:${pct}%"></div></div><div class="plb">${done} / ${total} completati</div></div>` : '';

  return `<div class="wo-bd">
    <div class="shla" style="margin-bottom:.35rem">Titolo scheda</div>
    <input class="title-input" id="woTitleInput" type="text" value="${esc(d.title)}" oninput="woSaveTitle()" placeholder="es. Full Body · Lunedì" style="margin-bottom:1rem"/>
    <ul class="wo-exercises">${items.length ? itemsHtml : emptyHtml}</ul>
    ${progHtml}
    <button onclick="woAddItem()" class="wo-add-btn">+ Aggiungi esercizio</button>
  </div>`;
}

function tlabel(k){return{retinoid:'Retinoid',glycolic:'Glicolico',peptide:'Peptidi',spf:'SPF',capelli:'Capelli',rose:'Rose'}[k]||k;}

function renderStep(s,key,num){
  const done=!!chk[key];
  const info=INFO[s.k];
  const displayName = customNames[key] || s.n;
  const tags=(s.tags||[]).map(t=>`<span class="stag tag-${t}">${tlabel(t)}</span>`).join('');
  const tim=s.t?`<span class="timing">${s.t}</span>`:'';
  const hasNote = notes[key] && notes[key].trim().length > 0;
  const noteLabel = hasNote ? `<span class="note-label">✎ nota</span>` : '';
  const sub=info?`<div class="ssub">${info.qty} · tocca per dettagli</div>`:'';
  const onclick = info ? ("openSheet('" + s.k + "','" + key + "')") : ("tog('" + key + "')");
  return '<div class="step ' + (done?'done':'') + '">' +
    '<span class="snum">' + num + '</span>' +
    '<div class="chk" onclick="tog(\'' + key + '\')"></div>' +
    '<div class="si" onclick="' + onclick + '">' +
      '<div class="snr"><span class="sn">' + displayName + '</span>' + tim + tags + noteLabel + '</div>' + sub +
    '</div>' +
  '</div>';
}

function progBar(done,total){
  const p=total?Math.round(done/total*100):0;
  return `<div class="prog"><div class="pbg"><div class="pfi" style="width:${p}%"></div></div><div class="plb">${done} / ${total} completati</div></div>`;
}

function evBadge(d){return[0,2,4].includes(d)?'Retinoid':[3,6].includes(d)?'Glicolico':'Base';}

function makeCard(id,iconEmoji,title,badgeClass,badgeText,bodyHtml){
  const open=isSectionOpen(id);
  return `<div class="card ${open?'':'shut'}" id="card-${id}">
    <div class="card-hd" onclick="toggleCard('${id}')">
      <span class="icon">${iconEmoji}</span>
      <span class="title">${title}</span>
      <span class="badge ${badgeClass}">${badgeText}</span>
      <span class="chevron">›</span>
    </div>
    <div class="card-body">${bodyHtml}</div>
  </div>`;
}

let tipTimerState = {running:false, phase:0, rep:0, elapsed:0, interval:null};

function renderTip(){
  const t = TIPS[day];
  const e = t.esercizio;
  const r = 44;
  const circ = Math.round(2 * Math.PI * r);
  return '<div class="tip-bd">'
    + '<div class="tip-icon">' + t.icon + '</div>'
    + '<div class="tip-titolo">' + t.titolo + '</div>'
    + '<div class="tip-testo">' + t.testo + '</div>'
    + '<div class="tip-intro">' + e.intro + '</div>'
    + '<div class="tip-timer">'
    + '<div class="tip-fase-label" id="tipFaseLabel">—</div>'
    + '<div class="tip-countdown" id="tipCountdown">—</div>'
    + '<svg class="tip-progress-ring" width="100" height="100" viewBox="0 0 100 100">'
    + '<circle cx="50" cy="50" r="' + r + '" fill="none" stroke="var(--line)" stroke-width="4"/>'
    + '<circle id="tipRing" cx="50" cy="50" r="' + r + '" fill="none" stroke="var(--gold)" stroke-width="4"'
    + ' stroke-dasharray="' + circ + '" stroke-dashoffset="' + circ + '"'
    + ' stroke-linecap="round" transform="rotate(-90 50 50)"'
    + ' style="transition:stroke-dashoffset .9s ease,stroke .4s"/>'
    + '</svg>'
    + '<div class="tip-rip" id="tipRip">0 / ' + e.ripetizioni + ' ripetizioni</div>'
    + '<button class="tip-avvia" id="tipBtn" onclick="tipStart()">▶ Avvia</button>'
    + '</div>'
    + '</div>';
}

function getTipNote(){
  try{ return localStorage.getItem('sk_tipnote_' + day) || ''; }catch(e){ return ''; }
}
function saveTipNote(v){
  try{ localStorage.setItem('sk_tipnote_' + day, v); }catch(e){}
}

function tipStart(){
  const t = TIPS[day];
  if(t.type !== 'esercizio') return;
  const e = t.esercizio;
  if(tipTimerState.running){ tipStop(); return; }
  tipTimerState = {running:true, phase:0, rep:0, elapsed:0, interval:null};
  document.getElementById('tipBtn').textContent = '■ Ferma';
  tipTick(e);
  tipTimerState.interval = setInterval(()=>tipTick(e), 1000);
}

function tipStop(){
  clearInterval(tipTimerState.interval);
  tipTimerState.running = false;
  const btn = document.getElementById('tipBtn');
  if(btn){ btn.textContent = '▶ Avvia'; }
  const lbl = document.getElementById('tipFaseLabel');
  if(lbl) lbl.textContent = '—';
  const cd = document.getElementById('tipCountdown');
  if(cd) cd.textContent = '—';
  const ring = document.getElementById('tipRing');
  if(ring){
    const r=44; const circ=Math.round(2*Math.PI*r);
    ring.style.strokeDashoffset = circ;
  }
}

function tipTick(e){
  const s = tipTimerState;
  if(!s.running) return;
  const fase = e.fasi[s.phase];
  const remaining = fase.durata - s.elapsed;

  // update UI
  const lbl = document.getElementById('tipFaseLabel');
  const cd  = document.getElementById('tipCountdown');
  const ring= document.getElementById('tipRing');
  const rip = document.getElementById('tipRip');

  if(lbl) lbl.textContent = fase.label;
  if(cd)  cd.textContent  = remaining + 's';
  if(ring){
    const r=44; const circ=Math.round(2*Math.PI*r);
    const progress = s.elapsed / fase.durata;
    ring.style.strokeDashoffset = Math.round(circ * (1 - progress));
    ring.style.stroke = fase.colore;
  }
  if(rip) rip.textContent = s.rep + ' / ' + e.ripetizioni + ' ripetizioni';

  s.elapsed++;

  if(s.elapsed > fase.durata){
    s.elapsed = 0;
    s.phase++;
    if(s.phase >= e.fasi.length){
      s.phase = 0;
      s.rep++;
      if(s.rep >= e.ripetizioni){
        // DONE
        clearInterval(s.interval);
        s.running = false;
        if(lbl) lbl.textContent = '✓ Completato';
        if(cd)  cd.textContent  = '';
        const btn = document.getElementById('tipBtn');
        if(btn){ btn.textContent = '▶ Rifai'; }
        if(rip) rip.textContent = e.ripetizioni + ' / ' + e.ripetizioni + ' ripetizioni';
        return;
      }
    }
  }
}

  const inp = document.getElementById('titleInput');
  if(!inp || !currentStepKey) return;
  const d = INFO[currentSheetKey];
  const val = inp.value.trim();
  if(val && val !== d.n){ customNames[currentStepKey]=val; }
  else { delete customNames[currentStepKey]; }
  saveNames();
  // aggiorna link ripristina live nel popup
  const resetEl = inp.nextElementSibling;
  if(customNames[currentStepKey]){
    if(!resetEl || !resetEl.classList.contains('title-reset')){
      const span = document.createElement('span');
      span.className = 'title-reset';
      span.textContent = '↺ ripristina nome originale';
      span.onclick = resetName;
      inp.parentNode.appendChild(span);
    }
  } else {
    if(resetEl && resetEl.classList.contains('title-reset')) resetEl.remove();
  }
  renderAll();
}

  if(!currentStepKey) return;
  delete customNames[currentStepKey];
  saveNames();
  const inp = document.getElementById('titleInput');
  if(inp){ inp.value = INFO[currentSheetKey].n; }
  const resetEl = inp && inp.nextElementSibling;
  if(resetEl && resetEl.classList.contains('title-reset')) resetEl.remove();
  renderAll();

// ── THEME ──
let currentTheme = 'dark';
try{ currentTheme = localStorage.getItem('sk_theme') || 'dark'; }catch(e){}
function applyTheme(t){
  currentTheme = t;
  document.body.classList.toggle('light', t === 'light');
  const lbl = document.getElementById('themeLabel');
  if(lbl) lbl.textContent = t === 'light' ? 'Passa al tema scuro' : 'Passa al tema chiaro';
  try{ localStorage.setItem('sk_theme', t); }catch(e){}
  // aggiorna colori SVG yoga
  updateYogaSvgColors(t);
}

function updateYogaSvgColors(t){
  // colori dark → light mapping
  const pairs = [
    ['#1a1612', '#f0e8e0'],  // sfondo SVG
    ['#141210', '#f0e8e0'],  // sfondo alternativo
    ['#3a2e28', '#f5e8d8'],  // viso
    ['#4a3a30', '#e4cfc0'],  // collo / orecchie / mani
    ['#5a3a28', '#c4906a'],  // iride
    ['#6a5040', '#c4a882'],  // capelli
  ];
  document.querySelectorAll('.yill svg').forEach(svg => {
    svg.querySelectorAll('[fill]').forEach(el => {
      const f = el.getAttribute('fill').toLowerCase();
      for(const [dark, light] of pairs){
        if(t === 'light' && f === dark){ el.setAttribute('fill', light); break; }
        if(t === 'dark'  && f === light){ el.setAttribute('fill', dark);  break; }
      }
    });
  });
}
function toggleTheme(){
  applyTheme(currentTheme === 'dark' ? 'light' : 'dark');
}
// apply on load
applyTheme(currentTheme);

// ── TIMER FLOTTANTE ──────────────────────────────────────────────────────────
let ft = { running:false, remaining:0, interval:null };

function toggleFTimer(){
  document.getElementById('ftimerPanel').classList.toggle('open');
  // rimuovi animazione quando apri
  document.getElementById('ftimerBtn').classList.remove('done');
  document.getElementById('ftimerBadge').classList.remove('show');
}
function ftimerToggle(){
  if(ft.running){ ftimerPause(); } else { ftimerStart(); }
}
function ftimerStart(){
  if(ft.remaining <= 0){
    const m = parseInt(document.getElementById('ftimerMin').value)||0;
    const s = parseInt(document.getElementById('ftimerSec').value)||0;
    ft.remaining = m*60+s;
    if(ft.remaining <= 0) return;
  }
  ft.running = true;
  document.getElementById('ftimerStartBtn').textContent = '⏸ Pausa';
  document.getElementById('ftimerDisplay').classList.add('running');
  document.getElementById('ftimerDisplay').classList.remove('done');
  ft.interval = setInterval(ftimerTick, 1000);
}
function ftimerPause(){
  ft.running = false;
  clearInterval(ft.interval);
  document.getElementById('ftimerStartBtn').textContent = '▶ Riprendi';
  document.getElementById('ftimerDisplay').classList.remove('running');
}
function ftimerTick(){
  ft.remaining--;
  ftimerUpdateDisplay();
  if(ft.remaining <= 0){
    clearInterval(ft.interval);
    ft.running = false;
    document.getElementById('ftimerStartBtn').textContent = '▶ Avvia';
    document.getElementById('ftimerDisplay').classList.remove('running');
    document.getElementById('ftimerDisplay').classList.add('done');
    document.getElementById('ftimerLabel').textContent = '✓ completato';
    if(navigator.vibrate) navigator.vibrate([300,100,300]);
    // se il pannello è chiuso, anima il bottone
    const panel = document.getElementById('ftimerPanel');
    if(!panel.classList.contains('open')){
      document.getElementById('ftimerBtn').classList.add('done');
      document.getElementById('ftimerBadge').classList.add('show');
    }
  }
}
function ftimerReset(){
  clearInterval(ft.interval);
  ft.running = false; ft.remaining = 0;
  document.getElementById('ftimerStartBtn').textContent = '▶ Avvia';
  document.getElementById('ftimerDisplay').classList.remove('running','done');
  document.getElementById('ftimerLabel').textContent = 'imposta minuti e secondi';
  const m = parseInt(document.getElementById('ftimerMin').value)||0;
  const s = parseInt(document.getElementById('ftimerSec').value)||0;
  ftimerUpdateDisplay(m*60+s);
}
function ftimerUpdateDisplay(val){
  const v = val !== undefined ? val : ft.remaining;
  const m = Math.floor(v/60); const s = v%60;
  document.getElementById('ftimerDisplay').textContent =
    String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}

renderDays();
renderAll();
updateYogaSvgColors(currentTheme);
// init global note
const _gn = document.getElementById('gnoteArea');
if(_gn) _gn.value = globalNote;
