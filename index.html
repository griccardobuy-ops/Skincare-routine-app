<style>
:root{
  --cream:#f5f0eb;--warm:#e8ddd2;--sand:#c9b8a4;
  --terracotta:#b07a5c;--deep:#3d2b1f;
  --mc:#f9c784;--ec:#8c7a9e;--tc:#7a9e8c;--yc:#9e7a8c;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--cream);color:var(--deep);font-family:'DM Mono',monospace;min-height:100vh;padding:1.5rem 1rem 4rem;}

/* ─ HEADER ─ */
header{text-align:center;margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:1px solid var(--sand);}
h1{font-family:'Cormorant Garamond',serif;font-size:2.2rem;font-weight:300;}
h1 em{font-style:italic;color:var(--terracotta);}
.sub{font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:var(--sand);margin-top:.3rem;}

/* ─ DAY SELECTOR ─ */
.days{display:flex;gap:.4rem;justify-content:center;flex-wrap:wrap;margin-bottom:1.8rem;}
.db{background:none;border:1px solid var(--sand);color:var(--deep);font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;padding:.4rem .7rem;cursor:pointer;border-radius:2px;transition:all .2s;}
.db.on{background:var(--deep);border-color:var(--deep);color:var(--cream);}
.db:hover:not(.on){border-color:var(--terracotta);color:var(--terracotta);}

/* ─ ACCORDION CARD ─ */
.card{background:white;border-radius:4px;margin-bottom:.8rem;overflow:hidden;box-shadow:0 1px 8px rgba(61,43,31,.06);}
.card-hd{
  display:flex;align-items:center;gap:.6rem;padding:.9rem 1.1rem;
  cursor:pointer;user-select:none;transition:filter .15s;
}
.card-hd:hover{filter:brightness(.97);}
.card-hd .icon{font-size:1rem;}
.card-hd .title{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:400;}
.badge{margin-left:auto;font-size:.5rem;letter-spacing:.1em;text-transform:uppercase;padding:.2rem .5rem;border-radius:2px;color:white;background:var(--sand);white-space:nowrap;}
.bm{background:var(--mc);color:var(--deep);}
.be{background:var(--ec);}
.bt{background:var(--tc);}
.by{background:var(--yc);}
.chevron{font-size:.65rem;color:var(--sand);margin-left:.4rem;transition:transform .25s;flex-shrink:0;}
.card.shut .chevron{transform:rotate(-90deg);}
.card-body{overflow:hidden;transition:max-height .32s ease, opacity .25s ease;max-height:3000px;opacity:1;}
.card.shut .card-body{max-height:0;opacity:0;}

/* ─ STEPS ─ */
.steps{padding:.3rem 0;}
.step{display:flex;align-items:flex-start;gap:.7rem;padding:.6rem 1.1rem;border-bottom:1px solid #f5f0eb;}
.step:last-child{border-bottom:none;}
.snum{font-size:.5rem;color:var(--sand);min-width:.9rem;text-align:right;flex-shrink:0;padding-top:3px;}
.chk{width:16px;height:16px;border:1.5px solid var(--sand);border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;margin-top:1px;}
.step.done .chk{background:var(--terracotta);border-color:var(--terracotta);}
.step.done .chk::after{content:'';width:5px;height:3px;border-left:1.5px solid white;border-bottom:1.5px solid white;transform:rotate(-45deg) translateY(-1px);}
.si{flex:1;cursor:pointer;min-width:0;}
.snr{display:flex;align-items:center;gap:.35rem;flex-wrap:wrap;}
.sn{font-size:.71rem;line-height:1.4;border-bottom:1px dashed transparent;transition:border-color .15s,color .15s;}
.si:hover .sn{color:var(--terracotta);border-bottom-color:var(--terracotta);}
.step.done .sn{text-decoration:line-through;color:var(--sand);}
.ssub{font-size:.54rem;color:var(--sand);font-style:italic;margin-top:.12rem;}
.stag{font-size:.46rem;letter-spacing:.08em;text-transform:uppercase;padding:.1rem .35rem;border-radius:2px;flex-shrink:0;}
.tag-retinoid{background:#f0e8ef;color:var(--ec);}
.tag-glycolic{background:#e8f0ed;color:#5a8a7a;}
.tag-peptide{background:#f0ebe8;color:var(--terracotta);}
.tag-spf{background:#fff3dc;color:#9a6e10;}
.tag-capelli{background:#eae8f0;color:#6a5a8a;}
.tag-rose{background:#fce8ee;color:#b05070;}
.timing{display:inline-block;font-size:.46rem;letter-spacing:.05em;text-transform:uppercase;background:#fef3e8;color:#a06030;border:1px solid #f0d8b8;padding:.08rem .35rem;border-radius:2px;flex-shrink:0;}

/* ─ PROGRESS ─ */
.prog{padding:0 1.1rem .75rem;}
.pbg{height:3px;background:var(--warm);border-radius:2px;overflow:hidden;}
.pfi{height:100%;background:var(--terracotta);border-radius:2px;transition:width .4s;}
.plb{font-size:.5rem;color:var(--sand);letter-spacing:.1em;margin-top:.28rem;}

/* ─ TIP ─ */
.tip-hd{background:#eef4f1;}
.tip-bd{padding:1rem 1.1rem;}
.tip-tx{font-size:.7rem;line-height:1.75;color:var(--deep);}

/* ─ YOGA ─ */
.yoga-hd{background:#f4eef3;}
.yoga-bd{padding:1rem 1.1rem;}
.yna{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:400;margin-bottom:.15rem;}
.yzo{font-size:.5rem;letter-spacing:.12em;text-transform:uppercase;color:var(--yc);margin-bottom:.85rem;}
.yill{width:100%;background:#fdf8f5;border-radius:6px;margin-bottom:.9rem;padding:.6rem;display:flex;align-items:center;justify-content:center;}
.yill svg{width:100%;max-width:260px;height:auto;display:block;margin:0 auto;}
.ysteps{list-style:none;margin-bottom:.7rem;}
.ysteps li{font-size:.67rem;line-height:1.6;padding:.22rem 0;border-bottom:1px dashed var(--warm);display:flex;gap:.5rem;}
.ysteps li:last-child{border-bottom:none;}
.ysteps li::before{content:attr(data-n);color:var(--yc);font-size:.58rem;flex-shrink:0;padding-top:.1rem;}
.yreps{display:inline-block;font-size:.56rem;background:#f4eef3;color:var(--yc);padding:.18rem .55rem;border-radius:2px;}

/* ─ RULES ─ */
.rules{background:white;border-radius:4px;padding:.9rem 1.1rem;box-shadow:0 1px 8px rgba(61,43,31,.06);margin-bottom:.8rem;}
.rt{font-size:.5rem;letter-spacing:.15em;text-transform:uppercase;color:var(--sand);margin-bottom:.65rem;}
.rule{font-size:.66rem;line-height:1.5;padding:.25rem 0;border-bottom:1px dashed var(--warm);display:flex;gap:.5rem;}
.rule:last-child{border-bottom:none;}
.rule::before{content:'—';color:var(--sand);flex-shrink:0;}

.reset{display:block;width:100%;padding:.65rem;background:none;border:1px dashed var(--sand);color:var(--sand);font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;border-radius:2px;transition:all .2s;margin-top:.5rem;}
.reset:hover{border-color:var(--terracotta);color:var(--terracotta);}
.congrats{text-align:center;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1rem;color:var(--terracotta);padding:.5rem 0;opacity:0;transition:opacity .5s;pointer-events:none;}
.congrats.show{opacity:1;}

/* ─ BOTTOM SHEET ─ */
.ov{display:none;position:fixed;inset:0;background:rgba(61,43,31,.42);z-index:200;align-items:flex-end;justify-content:center;}
.ov.open{display:flex;}
.sheet{background:var(--cream);width:100%;max-width:520px;border-radius:14px 14px 0 0;padding:1.4rem 1.4rem 3rem;max-height:85vh;overflow-y:auto;animation:up .22s ease;}
@keyframes up{from{transform:translateY(28px);opacity:0}to{transform:translateY(0);opacity:1}}
.sh{width:34px;height:3px;background:var(--sand);border-radius:2px;margin:0 auto 1.2rem;}
.shn{font-family:'Cormorant Garamond',serif;font-size:1.45rem;font-weight:400;margin-bottom:.3rem;}
.shta{margin-bottom:1rem;display:flex;gap:.4rem;flex-wrap:wrap;}
.shbl{margin-bottom:.9rem;padding-bottom:.9rem;border-bottom:1px dashed var(--warm);}
.shbl:last-child{border-bottom:none;margin-bottom:0;}
.shla{font-size:.5rem;letter-spacing:.15em;text-transform:uppercase;color:var(--sand);margin-bottom:.35rem;}
.shqt{font-family:'Cormorant Garamond',serif;font-size:1.05rem;color:var(--terracotta);}
.shtx{font-size:.7rem;line-height:1.75;}

/* notes textarea */
.notes-wrap{margin-top:.5rem;}
.notes-ta{
  width:100%;min-height:80px;padding:.6rem .75rem;
  background:white;border:1px solid var(--warm);border-radius:4px;
  font-family:'DM Mono',monospace;font-size:.68rem;line-height:1.6;color:var(--deep);
  resize:vertical;outline:none;transition:border-color .2s;
}
.notes-ta:focus{border-color:var(--sand);}
.notes-ta::placeholder{color:var(--sand);}
.notes-saved{font-size:.5rem;color:var(--tc);letter-spacing:.08em;margin-top:.3rem;opacity:0;transition:opacity .4s;}
.notes-saved.show{opacity:1;}

.shcl{display:block;width:100%;margin-top:1.3rem;padding:.75rem;background:var(--deep);color:var(--cream);border:none;font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;border-radius:2px;}
</style>
</head>

let day = new Date().getDay(); day = day===0?6:day-1;
// default: all sections open
function isSectionOpen(id){ return openSecs[id] !== false; }

// RENDER
// ─────────────────────────────────────────────────────────────────────────────
function tlabel(k){return{retinoid:'Retinoid',glycolic:'Glicolico',peptide:'Peptidi',spf:'SPF',capelli:'Capelli',rose:'Rose'}[k]||k;}

function renderStep(s,key,num){
  const done=!!chk[key];
  const info=INFO[s.k];
  const tags=(s.tags||[]).map(t=>`<span class="stag tag-${t}">${tlabel(t)}</span>`).join('');
  const tim=s.t?`<span class="timing">${s.t}</span>`:'';
  const sub=info?`<div class="ssub">${info.qty} · tocca per dettagli</div>`:'';
  return `<div class="step ${done?'done':''}">
    <span class="snum">${num}</span>
    <div class="chk" onclick="tog('${key}')"></div>
    <div class="si" onclick="${info?`openSheet('${s.k}')`:`tog('${key}')`}">
      <div class="snr"><span class="sn">${s.n}</span>${tim}${tags}</div>${sub}
    </div>
  </div>`;
}

function progBar(done,total){
  const p=total?Math.round(done/total*100):0;
  return `<div class="prog"><div class="pbg"><div class="pfi" style="width:${p}%"></div></div><div class="plb">${done} / ${total} completati</div></div>`;
}

function evBadge(d){return[0,2,4].includes(d)?'Retinoid':[3,6].includes(d)?'Glicolico':'Base';}

function makeCard(id,iconEmoji,title,badgeClass,badgeText,bodyHtml){
  const open=isSectionOpen(id);
  return `<div class="card ${open?'':'shut'}" id="card-${id}">
    <div class="card-hd" onclick="toggleCard('${id}')">
      <span class="icon">${iconEmoji}</span>
      <span class="title">${title}</span>
      <span class="badge ${badgeClass}">${badgeText}</span>
      <span class="chevron">›</span>
    </div>
    <div class="card-body">${bodyHtml}</div>
  </div>`;
}

function renderAll(){
  const eve=E[day];
  const mK=M.map((_,i)=>`${day}-m-${i}`);
  const eK=eve.map((_,i)=>`${day}-e-${i}`);
  const hK=`${day}-h`;
  const mD=mK.filter(k=>chk[k]).length;
  const eD=eK.filter(k=>chk[k]).length;
  const hD=chk[hK]?1:0;
  const total=M.length+eve.length+1;
  const done=mD+eD+hD;
  const y=YOGA[day];

  const morningBody=`<div class="steps">${M.map((s,i)=>renderStep(s,`${day}-m-${i}`,i+1)).join('')}</div>${progBar(mD,M.length)}`;
  const eveningBody=`<div class="steps">${eve.map((s,i)=>renderStep(s,`${day}-e-${i}`,i+1)).join('')}</div>${progBar(eD,eve.length)}`;
  const hairBody=`<div class="steps">${renderStep(HAIR,hK,1)}</div>`;
  const tipBody=`<div class="tip-bd"><div class="tip-tx">${TIPS[day]}</div></div>`;
  const yogaBody=`<div class="yoga-bd">
    <div class="yna">${y.name}</div>
    <div class="yzo">${y.zona}</div>
    <div class="yill">${Y_SVG[day]}</div>
    <ul class="ysteps">${y.steps.map((s,i)=>`<li data-n="${i+1}.">${s}</li>`).join('')}</ul>
    <span class="yreps">⏱ ${y.reps}</span>
  </div>`;

  document.getElementById('content').innerHTML =
    makeCard(`${day}-m`,'☀️','Mattina','bm','Tutti i giorni',morningBody)+
    makeCard(`${day}-e`,'🌙',`Sera · ${DF[day]}`,'be',evBadge(day),eveningBody)+
    makeCard(`${day}-h`,'💆','Capelli','','Ogni sera',hairBody)+
    makeCard(`${day}-tip`,'💡','Consiglio del giorno','bt','Pelle',tipBody)+
    makeCard(`${day}-yoga`,'🧘','Yoga del Viso','by','Face yoga',yogaBody)+
    `<div class="congrats ${done===total?'show':''}">Routine completata ✦ Brava!</div>`;
}

function renderDays(){
  document.getElementById('daySel').innerHTML=DS.map((d,i)=>
    `<button class="db ${i===day?'on':''}" onclick="setDay(${i})">${d}</button>`
  ).join('');
}

function setDay(i){day=i;renderDays();renderAll();}
function tog(k){chk[k]=!chk[k];saveChk();renderAll();}
function resetDay(){
  Object.keys(chk).filter(k=>k.startsWith(day+'-')).forEach(k=>delete chk[k]);
  saveChk();
  // rimuovi le chiavi così isSectionOpen ritorna true (default)
  [`${day}-m`,`${day}-e`,`${day}-h`,`${day}-tip`,`${day}-yoga`].forEach(id=>{ delete openSecs[id]; });
  saveSecs();
  renderAll();
}

function toggleCard(id){
  const c=document.getElementById('card-'+id);
  const wasOpen=!c.classList.contains('shut');
  c.classList.toggle('shut',wasOpen);
  openSecs[id]=!wasOpen;
  saveSecs();
}

// ─────────────────────────────────────────────────────────────────────────────
// SHEET
// ─────────────────────────────────────────────────────────────────────────────
let currentSheetKey = null;

function openSheet(k){
  const d=INFO[k]; if(!d) return;
  currentSheetKey = k;
  const tags=(d.tags||[]).map(t=>`<span class="stag tag-${t.k}" style="font-size:.58rem;padding:.18rem .45rem">${t.l}</span>`).join('');
  const noteVal = notes[k]||'';
  document.getElementById('shBody').innerHTML=`
    <div class="shn">${d.n}</div>
    <div class="shta">${tags}</div>
    <div class="shbl"><div class="shla">Quantità</div><div class="shqt">${d.qty}</div></div>
    <div class="shbl"><div class="shla">Come applicare</div><div class="shtx">${d.come}</div></div>
    <div class="shbl"><div class="shla">Consiglio</div><div class="shtx">${d.cons}</div></div>
    <div class="shbl">
      <div class="shla">Le mie note</div>
      <div class="notes-wrap">
        <textarea class="notes-ta" id="noteTa" placeholder="Aggiungi una nota personale…" oninput="saveNote()">${noteVal}</textarea>
        <div class="notes-saved" id="noteSaved">✓ salvato</div>
      </div>
    </div>
  `;
  document.getElementById('ov').classList.add('open');
}

let noteSaveTimer = null;
function saveNote(){
  const ta = document.getElementById('noteTa');
  if(!ta || !currentSheetKey) return;
  notes[currentSheetKey] = ta.value;
  saveNotes();
  clearTimeout(noteSaveTimer);
  const el = document.getElementById('noteSaved');
  if(el){ el.classList.add('show'); noteSaveTimer=setTimeout(()=>el.classList.remove('show'),1800); }
}

function closeSheet(){document.getElementById('ov').classList.remove('open');currentSheetKey=null;}
function maybeClose(e){if(e.target===document.getElementById('ov'))closeSheet();}

const blob=new Blob([JSON.stringify({name:'La Mia Routine',short_name:'Routine',display:'standalone',background_color:'#f5f0eb',theme_color:'#f5f0eb',icons:[{src:'data:image/svg+xml;base64,'+btoa(svgIcon),sizes:'512x512',type:'image/svg+xml'}]})],{type:'application/json'});

document.getElementById('appIcon').href='data:image/svg+xml;base64,'+btoa(svgIcon);

// ─────────────────────────────────────────────────────────────────────────────
renderDays();
renderAll();
</script>
