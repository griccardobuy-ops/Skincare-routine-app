<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Mia Routine v2.7</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="La Mia Routine">
<meta name="theme-color" content="#f5f0eb">
<link rel="apple-touch-icon" id="appIcon">
<link rel="manifest" id="manifestLink">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#f5f0eb;--warm:#e8ddd2;--sand:#c9b8a4;
  --terracotta:#b07a5c;--deep:#3d2b1f;
  --mc:#f9c784;--ec:#8c7a9e;--tc:#7a9e8c;--yc:#9e7a8c;--wc:#7a8e9e;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--cream);color:var(--deep);font-family:'DM Mono',monospace;min-height:100vh;padding:1.5rem 1rem 4rem;}

/* ─ HEADER ─ */
header{text-align:center;margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:1px solid var(--sand);}
h1{font-family:'Cormorant Garamond',serif;font-size:2.2rem;font-weight:300;}
h1 em{font-style:italic;color:var(--terracotta);}
.sub{font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:var(--sand);margin-top:.3rem;}

/* ─ DAY SELECTOR ─ */
.days{display:flex;gap:.4rem;justify-content:center;flex-wrap:wrap;margin-bottom:1.8rem;}
.db{background:none;border:1px solid var(--sand);color:var(--deep);font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;padding:.4rem .7rem;cursor:pointer;border-radius:2px;transition:all .2s;}
.db.on{background:var(--deep);border-color:var(--deep);color:var(--cream);}
.db:hover:not(.on){border-color:var(--terracotta);color:var(--terracotta);}

/* ─ ACCORDION CARD ─ */
.card{background:white;border-radius:4px;margin-bottom:.8rem;overflow:hidden;box-shadow:0 1px 8px rgba(61,43,31,.06);}
.card-hd{
  display:flex;align-items:center;gap:.6rem;padding:.9rem 1.1rem;
  cursor:pointer;user-select:none;transition:filter .15s;
}
.card-hd:hover{filter:brightness(.97);}
.card-hd .icon{font-size:1rem;}
.card-hd .title{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:400;}
.badge{margin-left:auto;font-size:.5rem;letter-spacing:.1em;text-transform:uppercase;padding:.2rem .5rem;border-radius:2px;color:white;background:var(--sand);white-space:nowrap;}
.bm{background:var(--mc);color:var(--deep);}
.be{background:var(--ec);}
.bt{background:var(--tc);}
.by{background:var(--yc);}
.bw{background:var(--wc);}
.chevron{font-size:.65rem;color:var(--sand);margin-left:.4rem;transition:transform .25s;flex-shrink:0;}
.card.shut .chevron{transform:rotate(-90deg);}
.card-body{overflow:hidden;transition:max-height .32s ease, opacity .25s ease;max-height:3000px;opacity:1;}
.card.shut .card-body{max-height:0;opacity:0;}

/* ─ STEPS ─ */
.steps{padding:.3rem 0;}
.step{display:flex;align-items:flex-start;gap:.7rem;padding:.6rem 1.1rem;border-bottom:1px solid #f5f0eb;}
.step:last-child{border-bottom:none;}
.snum{font-size:.5rem;color:var(--sand);min-width:.9rem;text-align:right;flex-shrink:0;padding-top:3px;}
.chk{width:16px;height:16px;border:1.5px solid var(--sand);border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;margin-top:1px;}
.step.done .chk{background:var(--terracotta);border-color:var(--terracotta);}
.step.done .chk::after{content:'';width:5px;height:3px;border-left:1.5px solid white;border-bottom:1.5px solid white;transform:rotate(-45deg) translateY(-1px);}
.si{flex:1;cursor:pointer;min-width:0;}
.snr{display:flex;align-items:center;gap:.35rem;flex-wrap:wrap;}
.sn{font-size:.71rem;line-height:1.4;border-bottom:1px dashed transparent;transition:border-color .15s,color .15s;}
.si:hover .sn{color:var(--terracotta);border-bottom-color:var(--terracotta);}
.step.done .sn{text-decoration:line-through;color:var(--sand);}
.ssub{font-size:.54rem;color:var(--sand);font-style:italic;margin-top:.12rem;}
.stag{font-size:.46rem;letter-spacing:.08em;text-transform:uppercase;padding:.1rem .35rem;border-radius:2px;flex-shrink:0;}
.tag-retinoid{background:#f0e8ef;color:var(--ec);}
.tag-glycolic{background:#e8f0ed;color:#5a8a7a;}
.tag-peptide{background:#f0ebe8;color:var(--terracotta);}
.tag-spf{background:#fff3dc;color:#9a6e10;}
.tag-capelli{background:#eae8f0;color:#6a5a8a;}
.tag-rose{background:#fce8ee;color:#b05070;}
.timing{display:inline-block;font-size:.46rem;letter-spacing:.05em;text-transform:uppercase;background:#fef3e8;color:#a06030;border:1px solid #f0d8b8;padding:.08rem .35rem;border-radius:2px;flex-shrink:0;}

/* ─ PROGRESS ─ */
.prog{padding:0 1.1rem .75rem;}
.pbg{height:3px;background:var(--warm);border-radius:2px;overflow:hidden;}
.pfi{height:100%;background:var(--terracotta);border-radius:2px;transition:width .4s;}
.plb{font-size:.5rem;color:var(--sand);letter-spacing:.1em;margin-top:.28rem;}

/* ─ TIP ─ */
.tip-hd{background:#eef4f1;}
.tip-bd{padding:1rem 1.1rem;}
.tip-tx{font-size:.7rem;line-height:1.75;color:var(--deep);}

/* ─ YOGA ─ */
.yoga-hd{background:#f4eef3;}
.yoga-bd{padding:1rem 1.1rem;}
.yna{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:400;margin-bottom:.15rem;}
.yzo{font-size:.5rem;letter-spacing:.12em;text-transform:uppercase;color:var(--yc);margin-bottom:.85rem;}
.yill{width:100%;background:#fdf8f5;border-radius:6px;margin-bottom:.9rem;padding:.6rem;display:flex;align-items:center;justify-content:center;}
.yill svg{width:100%;max-width:260px;height:auto;display:block;margin:0 auto;}
.ysteps{list-style:none;margin-bottom:.7rem;}
.ysteps li{font-size:.67rem;line-height:1.6;padding:.22rem 0;border-bottom:1px dashed var(--warm);display:flex;gap:.5rem;}
.ysteps li:last-child{border-bottom:none;}
.ysteps li::before{content:attr(data-n);color:var(--yc);font-size:.58rem;flex-shrink:0;padding-top:.1rem;}
.yreps{display:inline-block;font-size:.56rem;background:#f4eef3;color:var(--yc);padding:.18rem .55rem;border-radius:2px;}
.yvideo{display:inline-flex;align-items:center;gap:.35rem;margin-top:.65rem;font-size:.58rem;color:#c0392b;text-decoration:none;background:#fff5f5;border:1px solid #f5c6c6;padding:.28rem .6rem;border-radius:3px;transition:background .15s;cursor:pointer;}
.yvideo:hover{background:#fde8e8;}

/* ─ VIDEO POPUP ─ */
.vov{display:none;position:fixed;inset:0;background:rgba(20,10,5,.7);z-index:300;align-items:center;justify-content:center;padding:1rem;}
.vov.open{display:flex;}
.vpop{background:var(--deep);border-radius:8px;width:100%;max-width:520px;overflow:hidden;animation:up .22s ease;}
.vpop-hd{display:flex;align-items:center;justify-content:space-between;padding:.7rem 1rem;background:rgba(255,255,255,.06);}
.vpop-title{font-family:'Cormorant Garamond',serif;font-size:.95rem;color:var(--cream);font-style:italic;}
.vpop-close{background:none;border:none;color:var(--sand);font-size:1.1rem;cursor:pointer;padding:.1rem .3rem;line-height:1;}
.vpop-close:hover{color:var(--cream);}
.vpop-frame{position:relative;padding-bottom:56.25%;height:0;overflow:hidden;}
.vpop-frame iframe{position:absolute;top:0;left:0;width:100%;height:100%;}
.vpop-note{font-size:.5rem;color:var(--sand);letter-spacing:.08em;padding:.4rem 1rem;text-align:center;}

/* ─ WORKOUT ─ */
.wo-hd{background:#edf1f4;}
.wo-bd{padding:1rem 1.1rem;}
.wo-type{font-size:.5rem;letter-spacing:.14em;text-transform:uppercase;color:var(--wc);margin-bottom:.3rem;}
.wo-name{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:400;color:var(--deep);margin-bottom:.15rem;}
.wo-meta{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:.9rem;}
.wo-pill{font-size:.48rem;letter-spacing:.08em;text-transform:uppercase;background:#e4ecf2;color:var(--wc);padding:.12rem .45rem;border-radius:2px;}
.wo-rest{background:#f0ebe8;color:var(--terracotta);}
.wo-exercises{list-style:none;margin-bottom:.8rem;}
.wo-ex{display:flex;align-items:flex-start;gap:.7rem;padding:.55rem 0;border-bottom:1px dashed var(--warm);}
.wo-ex:last-child{border-bottom:none;}
.wo-ex-num{font-size:.5rem;color:var(--sand);min-width:1rem;text-align:right;flex-shrink:0;padding-top:.15rem;}
.wo-ex-body{flex:1;}
.wo-ex-name{font-size:.72rem;line-height:1.3;color:var(--deep);}
.wo-ex-detail{font-size:.56rem;color:var(--sand);margin-top:.1rem;font-style:italic;}
.wo-ex-chk{width:16px;height:16px;border:1.5px solid var(--sand);border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;margin-top:1px;}
.wo-ex.done .wo-ex-chk{background:var(--wc);border-color:var(--wc);}
.wo-ex.done .wo-ex-chk::after{content:'';width:5px;height:3px;border-left:1.5px solid white;border-bottom:1.5px solid white;transform:rotate(-45deg) translateY(-1px);}
.wo-ex.done .wo-ex-name{text-decoration:line-through;color:var(--sand);}
.wo-circuit{background:#edf1f4;border-radius:3px;padding:.4rem .7rem;margin-bottom:.7rem;font-size:.56rem;color:var(--wc);letter-spacing:.06em;}
.wo-rest-day{text-align:center;padding:1.5rem 1rem;}
.wo-rest-icon{font-size:2rem;margin-bottom:.5rem;}
.wo-rest-tx{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-style:italic;color:var(--sand);}
.wo-rest-sub{font-size:.6rem;color:var(--sand);margin-top:.3rem;}
.wo-add-btn{display:block;width:100%;margin-top:.8rem;padding:.65rem;background:none;border:1px dashed var(--wc);color:var(--wc);font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;border-radius:2px;transition:all .2s;}
.wo-add-btn:hover{background:var(--wc);color:white;}
.note-label{display:inline-flex;align-items:center;gap:.25rem;font-size:.46rem;letter-spacing:.07em;text-transform:uppercase;background:#e8f4fc;color:#4a8aaa;border:1px solid #b8d8ee;padding:.1rem .35rem;border-radius:2px;flex-shrink:0;}

/* ─ RULES ─ */
.rules{background:white;border-radius:4px;padding:.9rem 1.1rem;box-shadow:0 1px 8px rgba(61,43,31,.06);margin-bottom:.8rem;}
.rt{font-size:.5rem;letter-spacing:.15em;text-transform:uppercase;color:var(--sand);margin-bottom:.65rem;}
.rule{font-size:.66rem;line-height:1.5;padding:.25rem 0;border-bottom:1px dashed var(--warm);display:flex;gap:.5rem;}
.rule:last-child{border-bottom:none;}
.rule::before{content:'—';color:var(--sand);flex-shrink:0;}

.reset{display:block;width:100%;padding:.65rem;background:none;border:1px dashed var(--sand);color:var(--sand);font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;border-radius:2px;transition:all .2s;margin-top:.5rem;}
.reset:hover{border-color:var(--terracotta);color:var(--terracotta);}
.congrats{text-align:center;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1rem;color:var(--terracotta);padding:.5rem 0;opacity:0;transition:opacity .5s;pointer-events:none;}
.congrats.show{opacity:1;}

/* ─ BOTTOM SHEET ─ */
.ov{display:none;position:fixed;inset:0;background:rgba(61,43,31,.42);z-index:200;align-items:flex-end;justify-content:center;}
.ov.open{display:flex;}
.sheet{background:var(--cream);width:100%;max-width:520px;border-radius:14px 14px 0 0;padding:1.4rem 1.4rem 3rem;max-height:85vh;overflow-y:auto;animation:up .22s ease;}
@keyframes up{from{transform:translateY(28px);opacity:0}to{transform:translateY(0);opacity:1}}
.sh{width:34px;height:3px;background:var(--sand);border-radius:2px;margin:0 auto 1.2rem;}
.shn{font-family:'Cormorant Garamond',serif;font-size:1.45rem;font-weight:400;margin-bottom:.3rem;}
.shta{margin-bottom:1rem;display:flex;gap:.4rem;flex-wrap:wrap;}
.shbl{margin-bottom:.9rem;padding-bottom:.9rem;border-bottom:1px dashed var(--warm);}
.shbl:last-child{border-bottom:none;margin-bottom:0;}
.shla{font-size:.5rem;letter-spacing:.15em;text-transform:uppercase;color:var(--sand);margin-bottom:.35rem;}
.shqt{font-family:'Cormorant Garamond',serif;font-size:1.05rem;color:var(--terracotta);}
.shtx{font-size:.7rem;line-height:1.75;}

/* notes textarea */
.notes-wrap{margin-top:.5rem;}
.notes-ta{
  width:100%;min-height:80px;padding:.6rem .75rem;
  background:white;border:1px solid var(--warm);border-radius:4px;
  font-family:'DM Mono',monospace;font-size:.68rem;line-height:1.6;color:var(--deep);
  resize:vertical;outline:none;transition:border-color .2s;
}
.notes-ta:focus{border-color:var(--sand);}
.notes-ta::placeholder{color:var(--sand);}
.notes-saved{font-size:.5rem;color:var(--tc);letter-spacing:.08em;margin-top:.3rem;opacity:0;transition:opacity .4s;}
.notes-saved.show{opacity:1;}
.title-input{
  width:100%;padding:.45rem .6rem;margin-top:.4rem;
  background:white;border:1px solid var(--warm);border-radius:4px;
  font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:var(--deep);
  outline:none;transition:border-color .2s;
}
.title-input:focus{border-color:var(--sand);}
.title-reset{font-size:.52rem;color:var(--sand);cursor:pointer;margin-top:.25rem;display:inline-block;text-decoration:underline;}
.title-reset:hover{color:var(--terracotta);}
/* ─ NOTE GLOBALI ─ */
.gnotes-card{background:white;border-radius:4px;margin-top:.8rem;box-shadow:0 1px 8px rgba(61,43,31,.06);overflow:hidden;}
.gnotes-hd{display:flex;align-items:center;gap:.6rem;padding:.9rem 1.1rem;background:var(--warm);}
.gnotes-hd .title{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:400;}
.gnotes-bd{padding:1rem 1.1rem;}
.gnotes-ta{width:100%;min-height:140px;padding:.7rem .8rem;background:#fdf8f5;border:1px solid var(--warm);border-radius:4px;font-family:'DM Mono',monospace;font-size:.7rem;line-height:1.7;color:var(--deep);resize:vertical;outline:none;transition:border-color .2s;}
.gnotes-ta:focus{border-color:var(--sand);}
.gnotes-ta::placeholder{color:var(--sand);}
.gnotes-saved{font-size:.5rem;color:var(--tc);letter-spacing:.08em;margin-top:.3rem;opacity:0;transition:opacity .5s;}
.gnotes-saved.show{opacity:1;}

.shcl{display:block;width:100%;margin-top:1.3rem;padding:.75rem;background:var(--deep);color:var(--cream);border:none;font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;border-radius:2px;}
</style>
</head>

  </div>
</div>

<!-- SHEET -->
<div class="ov" id="ov" onclick="maybeClose(event)">
  <div class="sheet">
    <div class="sh"></div>
    <div id="shBody"></div>
    <button class="shcl" onclick="closeSheet()">Chiudi</button>
  </div>
</div>

  <div class="vpop">

  </div>
</div>

// STATE
// ─────────────────────────────────────────────────────────────────────────────
let chk = {}, notes = {}, openSecs = {}, customNames = {}, globalNote = '';
try{chk=JSON.parse(localStorage.getItem('sk_chk')||'{}');}catch(e){}
try{notes=JSON.parse(localStorage.getItem('sk_notes')||'{}');}catch(e){}
try{openSecs=JSON.parse(localStorage.getItem('sk_secs')||'{}');}catch(e){}
try{customNames=JSON.parse(localStorage.getItem('sk_names')||'{}');}catch(e){}
try{globalNote=localStorage.getItem('sk_gnote')||'';}catch(e){}

function saveChk(){try{localStorage.setItem('sk_chk',JSON.stringify(chk));}catch(e){}}
function saveNotes(){try{localStorage.setItem('sk_notes',JSON.stringify(notes));}catch(e){}}
function saveSecs(){try{localStorage.setItem('sk_secs',JSON.stringify(openSecs));}catch(e){}}
function saveNames(){try{localStorage.setItem('sk_names',JSON.stringify(customNames));}catch(e){}}
function saveGlobalNote(){try{localStorage.setItem('sk_gnote',globalNote);}catch(e){}}

let day = new Date().getDay(); day = day===0?6:day-1;
// default: solo la sera è aperta, tutto il resto chiuso
function isSectionOpen(id){
  if(openSecs[id] !== undefined) return openSecs[id] !== false;
  // default: solo la sera è aperta per le sezioni giornaliere, note sempre aperte
  return id === `${day}-e` || id === 'gnote';
}

// ─────────────────────────────────────────────────────────────────────────────
// WORKOUT — fully custom, per-day
// ─────────────────────────────────────────────────────────────────────────────
// Storage: woData = { "0": { title:"Lunedì", items:[{id,name,serie,reps,note,done}] }, ... }
let woData = {};
try{ woData = JSON.parse(localStorage.getItem('sk_wo') || '{}'); }catch(e){}
function saveWo(){ try{ localStorage.setItem('sk_wo', JSON.stringify(woData)); }catch(e){} }

// ensure day entry exists
function woDayEnsure(){
  if(!woData[day]) woData[day] = { title:'', items:[] };
}

function woNewId(){
  return Date.now().toString(36) + Math.random().toString(36).slice(2,5);
}

function woAddItem(){
  woDayEnsure();
  woData[day].items.push({ id: woNewId(), name:'Nuovo esercizio', serie:'', reps:'', note:'', done:false });
  saveWo(); renderAll();
}

function woDeleteItem(id){
  woDayEnsure();
  woData[day].items = woData[day].items.filter(x => x.id !== id);
  saveWo(); renderAll();
}

function woToggle(id){
  woDayEnsure();
  const it = woData[day].items.find(x => x.id === id);
  if(it){ it.done = !it.done; saveWo(); renderAll(); }
}

function woSaveTitle(){
  const el = document.getElementById('woTitleInput');
  if(!el) return;
  woDayEnsure();
  woData[day].title = el.value;
  saveWo();
}

// open the workout item sheet
let currentWoId = null;
function woOpenSheet(id){
  woDayEnsure();
  const it = woData[day].items.find(x => x.id === id);
  if(!it) return;
  currentWoId = id;
  document.getElementById('shBody').innerHTML = `
    <div class="shbl">
      <div class="shla">Nome esercizio</div>
      <input class="title-input" id="woName" type="text" value="${esc(it.name)}" oninput="woSaveField()" placeholder="es. Squat"/>
    </div>
    <div class="shbl" style="display:flex;gap:.7rem;">
      <div style="flex:1">
        <div class="shla">Serie</div>
        <input class="title-input" id="woSerie" type="text" value="${esc(it.serie)}" oninput="woSaveField()" placeholder="es. 3"/>
      </div>
      <div style="flex:1">
        <div class="shla">Reps / Durata</div>
        <input class="title-input" id="woReps" type="text" value="${esc(it.reps)}" oninput="woSaveField()" placeholder="es. 12 / 40s"/>
      </div>
    </div>
    <div class="shbl">
      <div class="shla">Note</div>
      <textarea class="notes-ta" id="woNote" oninput="woSaveField()" placeholder="Indicazioni, varianti, carichi…">${esc(it.note)}</textarea>
    </div>
    <div class="shbl" style="border-bottom:none;padding-bottom:0">
      <button onclick="woDeleteItem('${id}');closeSheet();" style="background:none;border:1px dashed #c4a080;color:#c4a080;font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;padding:.5rem .8rem;border-radius:2px;cursor:pointer;width:100%">✕ Elimina voce</button>
    </div>
  `;
  document.getElementById('ov').classList.add('open');
}

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

function woSaveField(){
  if(!currentWoId) return;
  woDayEnsure();
  const it = woData[day].items.find(x => x.id === currentWoId);
  if(!it) return;
  const n = document.getElementById('woName');
  const s = document.getElementById('woSerie');
  const r = document.getElementById('woReps');
  const no = document.getElementById('woNote');
  if(n) it.name  = n.value;
  if(s) it.serie = s.value;
  if(r) it.reps  = r.value;
  if(no) it.note  = no.value;
  saveWo();
  renderAll();
}

function renderWorkout(){
  woDayEnsure();
  const d = woData[day];
  const items = d.items || [];
  const done = items.filter(x=>x.done).length;
  const total = items.length;
  const pct = total ? Math.round(done/total*100) : 0;

  const itemsHtml = items.map((it,i) => {
    const sub = [it.serie ? it.serie+' serie' : '', it.reps || ''].filter(Boolean).join(' · ');
    const hasNote = it.note && it.note.trim();
    const detailHtml = sub ? '<div class="wo-ex-detail">' + esc(sub) + '</div>' : '';
    const nameHtml = esc(it.name) + (hasNote ? '<span class="note-label" style="margin-left:.4rem">✎ nota</span>' : '');
    return `<li class="wo-ex ${it.done?'done':''}">
      <span class="wo-ex-num">${i+1}</span>
      <div class="wo-ex-body" onclick="woOpenSheet('${it.id}')">
        <div class="wo-ex-name">${nameHtml}</div>
        ${detailHtml}
      </div>
      <div class="wo-ex-chk" onclick="woToggle('${it.id}')"></div>
    </li>`;
  }).join('');

  const emptyHtml = `<div style="text-align:center;padding:1.4rem 0 .8rem;color:var(--sand);font-size:.68rem;font-style:italic">Nessun esercizio · aggiungine uno ↓</div>`;

  const progHtml = total ? `<div class="prog" style="margin-top:.4rem"><div class="pbg"><div class="pfi" style="width:${pct}%;background:var(--wc)"></div></div><div class="plb">${done} / ${total} completati</div></div>` : '';

  return `<div class="wo-bd">
    <div class="shla" style="margin-bottom:.35rem">Titolo scheda</div>
    <input class="title-input" id="woTitleInput" type="text" value="${esc(d.title)}" oninput="woSaveTitle()" placeholder="es. Full Body · Lunedì" style="margin-bottom:1rem"/>
    <ul class="wo-exercises">${items.length ? itemsHtml : emptyHtml}</ul>
    ${progHtml}
    <button onclick="woAddItem()" class="wo-add-btn">+ Aggiungi esercizio</button>
  </div>`;
}

// ─────────────────────────────────────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────────────────────────────────────
function tlabel(k){return{retinoid:'Retinoid',glycolic:'Glicolico',peptide:'Peptidi',spf:'SPF',capelli:'Capelli',rose:'Rose'}[k]||k;}

function renderStep(s,key,num){
  const done=!!chk[key];
  const info=INFO[s.k];
  const displayName = customNames[key] || s.n;
  const tags=(s.tags||[]).map(t=>`<span class="stag tag-${t}">${tlabel(t)}</span>`).join('');
  const tim=s.t?`<span class="timing">${s.t}</span>`:'';
  const hasNote = notes[key] && notes[key].trim().length > 0;
  const noteLabel = hasNote ? `<span class="note-label">✎ nota</span>` : '';
  const sub=info?`<div class="ssub">${info.qty} · tocca per dettagli</div>`:'';
  const onclick = info ? ("openSheet('" + s.k + "','" + key + "')") : ("tog('" + key + "')");
  return '<div class="step ' + (done?'done':'') + '">' +
    '<span class="snum">' + num + '</span>' +
    '<div class="chk" onclick="tog(\'' + key + '\')"></div>' +
    '<div class="si" onclick="' + onclick + '">' +
      '<div class="snr"><span class="sn">' + displayName + '</span>' + tim + tags + noteLabel + '</div>' + sub +
    '</div>' +
  '</div>';
}

function progBar(done,total){
  const p=total?Math.round(done/total*100):0;
  return `<div class="prog"><div class="pbg"><div class="pfi" style="width:${p}%"></div></div><div class="plb">${done} / ${total} completati</div></div>`;
}

function evBadge(d){return[0,2,4].includes(d)?'Retinoid':[3,6].includes(d)?'Glicolico':'Base';}

function makeCard(id,iconEmoji,title,badgeClass,badgeText,bodyHtml){
  const open=isSectionOpen(id);
  return `<div class="card ${open?'':'shut'}" id="card-${id}">
    <div class="card-hd" onclick="toggleCard('${id}')">
      <span class="icon">${iconEmoji}</span>
      <span class="title">${title}</span>
      <span class="badge ${badgeClass}">${badgeText}</span>
      <span class="chevron">›</span>
    </div>
    <div class="card-body">${bodyHtml}</div>
  </div>`;
}

let gnoteTimer = null;
function onGlobalNoteInput(){
  globalNote = document.getElementById('gnoteArea').value;
  saveGlobalNote();
  clearTimeout(gnoteTimer);
  const el = document.getElementById('gnoteSaved');
  if(el){ el.classList.add('show'); gnoteTimer=setTimeout(()=>el.classList.remove('show'), 1600); }
}

function renderAll(){
  const eve=E[day];
  const mK=M.map((_,i)=>`${day}-m-${i}`);
  const eK=eve.map((_,i)=>`${day}-e-${i}`);
  const hK=`${day}-h`;
  const mD=mK.filter(k=>chk[k]).length;
  const eD=eK.filter(k=>chk[k]).length;
  const hD=chk[hK]?1:0;
  const total=M.length+eve.length+1;
  const done=mD+eD+hD;
  const y=YOGA[day];

  const morningBody='<div class="steps">' + M.map((s,i)=>renderStep(s,day+'-m-'+i,i+1)).join('') + '</div>' + progBar(mD,M.length);
  const eveningBody='<div class="steps">' + eve.map((s,i)=>renderStep(s,day+'-e-'+i,i+1)).join('') + '</div>' + progBar(eD,eve.length);
  const hairBody=`<div class="steps">${renderStep(HAIR,hK,1)}</div>`;
  const tipBody=`<div class="tip-bd"><div class="tip-tx">${TIPS[day]}</div></div>`;
  const yogaBody=`<div class="yoga-bd">
    <div class="yna">${y.name}</div>
    <div class="yzo">${y.zona}</div>
    <div class="yill">${Y_SVG[day]}</div>
    <ul class="ysteps">${y.steps.map((s,i)=>`<li data-n="${i+1}.">${s}</li>`).join('')}</ul>
    <span class="yreps">⏱ ${y.reps}</span>
    <br><button class="yvideo" onclick="openVideo('${y.video}','${y.name}')">▶ Guarda il video di riferimento</button>
  </div>`;

  const workoutBody = renderWorkout();

  document.getElementById('content').innerHTML =
    makeCard(`${day}-m`,'☀️','Mattina','bm','Tutti i giorni',morningBody)+
    makeCard(`${day}-e`,'🌙',`Sera · ${DF[day]}`,'be',evBadge(day),eveningBody)+
    makeCard(`${day}-h`,'💆','Capelli','','Ogni sera',hairBody)+
    makeCard(`${day}-yoga`,'🧘','Yoga del Viso','by','Face yoga',yogaBody)+
    makeCard(`${day}-wo`,'💪','Allenamento','bw','Custom',workoutBody)+
    makeCard(`${day}-tip`,'💡','Consiglio del giorno','bt','Pelle',tipBody)+
    `<div class="congrats ${done===total?'show':''}">Routine completata ✦ Brava!</div>`;
}

function renderDays(){
  document.getElementById('daySel').innerHTML=DS.map((d,i)=>
    `<button class="db ${i===day?'on':''}" onclick="setDay(${i})">${d}</button>`
  ).join('');
}

function setDay(i){day=i;renderDays();renderAll();}
function tog(k){chk[k]=!chk[k];saveChk();renderAll();}
function resetDay(){
  Object.keys(chk).filter(k=>k.startsWith(day+'-')).forEach(k=>delete chk[k]);
  saveChk();
  // rimuovi le chiavi così isSectionOpen ritorna true (default)
  [`${day}-m`,`${day}-e`,`${day}-h`,`${day}-wo`,`${day}-tip`,`${day}-yoga`].forEach(id=>{ delete openSecs[id]; });
  saveSecs();
  renderAll();
}

function toggleCard(id){
  const c=document.getElementById('card-'+id);
  const wasOpen=!c.classList.contains('shut');
  c.classList.toggle('shut',wasOpen);
  openSecs[id]=!wasOpen;
  saveSecs();
}

// ─────────────────────────────────────────────────────────────────────────────
// SHEET
// ─────────────────────────────────────────────────────────────────────────────
let currentSheetKey = null;
let currentStepKey = null;

function openSheet(k, stepKey){
  const d=INFO[k]; if(!d) return;
  currentSheetKey = k;
  currentStepKey = stepKey || k;
  const tags=(d.tags||[]).map(t=>`<span class="stag tag-${t.k}" style="font-size:.58rem;padding:.18rem .45rem">${t.l}</span>`).join('');
  const noteVal = notes[currentStepKey]||'';
  const nameVal = customNames[currentStepKey]||d.n;
  const isCustom = !!customNames[currentStepKey];
  const resetLink = isCustom ? '<span class="title-reset" onclick="resetName()">↺ ripristina nome originale</span>' : '';
  document.getElementById('shBody').innerHTML=`
    <div class="shbl" style="padding-bottom:.8rem;margin-bottom:.8rem;border-bottom:1px dashed var(--warm)">
      <div class="shla">Nome voce</div>
      <input class="title-input" id="titleInput" type="text" value="${nameVal.replace(/"/g,'&quot;')}" oninput="saveName()" placeholder="${d.n}"/>
      ${resetLink}
    </div>
    <div class="shta">${tags}</div>
    <div class="shbl"><div class="shla">Quantità</div><div class="shqt">${d.qty}</div></div>
    <div class="shbl"><div class="shla">Come applicare</div><div class="shtx">${d.come}</div></div>
    <div class="shbl"><div class="shla">Consiglio</div><div class="shtx">${d.cons}</div></div>
    <div class="shbl">
      <div class="shla">Le mie note</div>
      <div class="notes-wrap">
        <textarea class="notes-ta" id="noteTa" placeholder="Aggiungi una nota personale…" oninput="saveNote()">${noteVal}</textarea>
        <div class="notes-saved" id="noteSaved">✓ salvato</div>
      </div>
    </div>
  `;
  document.getElementById('ov').classList.add('open');
}

let noteSaveTimer = null;
function saveName(){
  const inp = document.getElementById('titleInput');
  if(!inp || !currentStepKey) return;
  const d = INFO[currentSheetKey];
  const val = inp.value.trim();
  if(val && val !== d.n){ customNames[currentStepKey]=val; }
  else { delete customNames[currentStepKey]; }
  saveNames();
  // aggiorna link ripristina live nel popup
  const resetEl = inp.nextElementSibling;
  if(customNames[currentStepKey]){
    if(!resetEl || !resetEl.classList.contains('title-reset')){
      const span = document.createElement('span');
      span.className = 'title-reset';
      span.textContent = '↺ ripristina nome originale';
      span.onclick = resetName;
      inp.parentNode.appendChild(span);
    }
  } else {
    if(resetEl && resetEl.classList.contains('title-reset')) resetEl.remove();
  }
  renderAll();
}
function resetName(){
  if(!currentStepKey) return;
  delete customNames[currentStepKey];
  saveNames();
  const inp = document.getElementById('titleInput');
  if(inp){ inp.value = INFO[currentSheetKey].n; }
  const resetEl = inp && inp.nextElementSibling;
  if(resetEl && resetEl.classList.contains('title-reset')) resetEl.remove();
  renderAll();
}
function saveNote(){
  const ta = document.getElementById('noteTa');
  if(!ta || !currentStepKey) return;
  notes[currentStepKey] = ta.value;
  saveNotes();
  clearTimeout(noteSaveTimer);
  const el = document.getElementById('noteSaved');
  if(el){ el.classList.add('show'); noteSaveTimer=setTimeout(()=>{ el.classList.remove('show'); renderAll(); },1800); }
}

function closeSheet(){document.getElementById('ov').classList.remove('open');currentSheetKey=null;}
function maybeClose(e){if(e.target===document.getElementById('ov'))closeSheet();}

function openVideo(url, title){
  // Convert youtube watch URL to embed URL
  const embedUrl = url
    .replace('youtube.com/watch?v=', 'youtube.com/embed/')
    .replace('youtu.be/', 'youtube.com/embed/')
    .replace('youtube.com/shorts/', 'youtube.com/embed/');
  document.getElementById('vFrame').src = embedUrl + '?autoplay=1';
  document.getElementById('vTitle').textContent = title;
  document.getElementById('vov').classList.add('open');
}
function closeVideo(e){
  if(e && e.target !== document.getElementById('vov')) return;
  document.getElementById('vov').classList.remove('open');
  document.getElementById('vFrame').src = ''; // stop video
}
